<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="jwt-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d63aff"/>
      <stop offset="100%" stop-color="#fb015b"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="#000"/>
  <!-- JWT logo: three columns of squares (header.payload.signature) -->
  <!-- Left column (pink) -->
  <rect x="20" y="16" width="14" height="14" rx="2" fill="#fb015b"/>
  <rect x="20" y="34" width="14" height="14" rx="2" fill="#fb015b"/>
  <rect x="20" y="52" width="14" height="14" rx="2" fill="#fb015b" opacity="0.5"/>
  <rect x="20" y="70" width="14" height="14" rx="2" fill="#fb015b" opacity="0.25"/>
  <!-- Centre column (white) -->
  <rect x="43" y="16" width="14" height="14" rx="2" fill="white"/>
  <rect x="43" y="34" width="14" height="14" rx="2" fill="white"/>
  <rect x="43" y="52" width="14" height="14" rx="2" fill="white"/>
  <rect x="43" y="70" width="14" height="14" rx="2" fill="white"/>
  <!-- Right column (purple) -->
  <rect x="66" y="16" width="14" height="14" rx="2" fill="#d63aff"/>
  <rect x="66" y="34" width="14" height="14" rx="2" fill="#d63aff"/>
  <rect x="66" y="52" width="14" height="14" rx="2" fill="#d63aff" opacity="0.5"/>
  <rect x="66" y="70" width="14" height="14" rx="2" fill="#d63aff" opacity="0.25"/>
</svg>
